services:
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile.dev
      args:
        VERSION: ${VERSION}
    env_file: ./.env
    container_name: tablemind_front
    ports:
      - "${PORT_FRNT}:3000"
    volumes:
      - ./frontend/tablemind:/tablemind
    networks:
      - app_net

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      args:
        VERSION: ${VERSION}
    env_file: ./.env
    container_name: tablemind_back
    ports:
      - "${PORT_BACK}:8000"
    volumes:
      - uploads:${BASE_UPLOAD_DIR}
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - app_net

  worker:
    build:
      context: .
      dockerfile: ./worker/Dockerfile
      args:
        VERSION: ${VERSION}
    container_name: tablemind_worker
    depends_on:
      - redis
      - backend
    env_file: ./.env
    networks:
      - app_net

  redis:
    image: redis:latest
    container_name: tablemind_redis
    networks:
      - app_net
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:latest
    env_file: ./.env
    container_name: tablemind_db
    networks:
      - app_net
      - pgadmin_net
    environment:
      POSTGRES_USER: ${USER_DB}
      POSTGRES_PASSWORD: ${PASS_DB}
      POSTGRES_DB: ${NAME_DB}
    volumes:
      - postgresql:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB} -d ${NAME_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  app_net:
    driver: bridge
    name: tablemind_network

  pgadmin_net:
    name: pgadmin_network
    external: true

volumes:
  uploads:
    name: tablemind_vol_uploads
  frontend:
    name: tablemind_vol_frontend
  postgresql:
    name: tablemind_vol_pg
  pgadmin:
    name: tablemind_vol_pgadmin
