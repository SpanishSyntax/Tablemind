services:
  nginx:
    container_name: tablemind_nginx
    image: nginx:latest
    env_file: ./.env
    restart: unless-stopped
    secrets:
      - https_public
      - https_private
    networks:
      - tablemind_nginx
    ports:
      - "${PORT_AUTH}:${PORT_AUTH}"
      - "${PORT_CORE}:${PORT_CORE}"
      - "${PORT_FRONT}:${PORT_FRONT}"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

  db:
    container_name: tablemind_db
    image: postgres:18-bookworm
    env_file: ./.env
    secrets:
      - postgres_password
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    networks:
      - tablemind_db_net
      - pgadmin_net
    volumes:
      - postgresql:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  persister:
    container_name: tablemind_persister
    build:
      context: .
      dockerfile: Persistence/Dockerfile
    image: spanishsyntax/apps:tablemind-Persister
    env_file: ./.env
    secrets:
      - jwt_private_key
      - jwt_public_key
      - postgres_password
      - fernet_password
      - users_file
    networks:
      - tablemind_db_net

  api_auth:
    container_name: tablemind_api_auth
    build:
      context: .
      dockerfile: Auth/Dockerfile

    image: spanishsyntax/apps:tablemind-Auth
    env_file: ./.env
    secrets:
      - jwt_private_key
      - jwt_public_key
      - postgres_password
      - fernet_password
    networks:
      - tablemind_db_net
      - tablemind_nginx
    depends_on:
      db:
        condition: service_healthy

  api_core:
    container_name: tablemind_api_core
    build:
      context: .
      dockerfile: Core/Dockerfile
    image: spanishsyntax/apps:tablemind-Core
    env_file: ./.env
    secrets:
      - jwt_private_key
      - jwt_public_key
      - postgres_password
      - fernet_password
    networks:
      - tablemind_db_net
      - tablemind_nginx

  worker:
    container_name: tablemind_worker
    build:
      context: .
      dockerfile: ./Worker/Dockerfile
    image: spanishsyntax/apps:tablemind-Worker
    depends_on:
      - redis
      - api_core
    env_file: ./.env
    secrets:
      - jwt_private_key
      - jwt_public_key
      - postgres_password
      - fernet_password
    networks:
      - tablemind_db_net

  redis:
    image: redis:latest
    container_name: tablemind_redis
    networks:
      - tablemind_db_net
    depends_on:
      db:
        condition: service_healthy

  frontend:
    container_name: tablemind_front
    build:
      context: .
      dockerfile: ./Frontend/Dockerfile
    image: spanishsyntax/apps:tablemind-Front
    env_file: ./.env
    networks:
      - tablemind_nginx

networks:
  tablemind_db_net:
    driver: bridge
    name: tablemind_db_network

  tablemind_nginx:
    driver: bridge
    name: tablemind_nginx_network

  pgadmin_net:
    name: pgadmin_network
    external: true

volumes:
  postgresql:
    name: stats_vol_pg
  uploads:
    name: tablemind_vol_uploads

secrets:
  postgres_password:
    environment: POSTGRES_PASSWORD
  fernet_password:
    environment: FERNET_PASSWORD
  jwt_public_key:
    file: ./Secrets/jwt_public.pem
  jwt_private_key:
    file: ./Secrets/jwt_private.pem
  users_file:
    file: ./Secrets/users.toml
  https_public:
    file: ./Secrets/cert.crt
  https_private:
    file: ./Secrets/cert.key
